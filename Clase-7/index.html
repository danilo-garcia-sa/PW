<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de distros linux</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <header>
        <h1>Explorador de distros linux</h1>
        <p>Buscá y filtrá distros de Linux por nombre o familia.</p>
    </header>
    <main>
        <section class="controles">
            <input
            type="text" id="busqueda" placeholder="Buscar una distro...">
            <select id="familia">
                <option value="">Todas las familias</option>
                <option value="Debian">Debian</option>
                <option value="Arch">Arch</option>
                <option value="Fedora">Fedora</option>
                <option value="Independiente">Independiente</option>
            </select>
        </section>
        <p id="contador">0 distros encontradas</p>
        <section id="grilla" class="grilla">
        </section>
    </main>
    <script src="script.js"></script>
<body>
